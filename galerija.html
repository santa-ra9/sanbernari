<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanbernāri</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        header {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 20px;
            width: 100%;
            padding: 15px 20px;
            background-color: rgba(255, 255, 255, 0.95);
        }

        header img {
            max-width: 60px;
            height: auto;
        }

        header ul {
            display: flex;
            list-style: none;
            gap: 20px;
        }

        header a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: color 0.2s;
        }

        header a:hover {
            color: #666;
        }

        #main-container {
            position: relative;
            width: 100%;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        img#pictureGallery {
            width: 100%;
            max-height: 85vh;
            object-fit: contain;
        }

        #navigation {
            position: absolute;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        button {
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            font-size: clamp(20px, 5vw, 40px);
            cursor: pointer;
            transition: background-color 0.2s;
            min-width: 44px;
            min-height: 44px;
            padding: 10px;
        }

        button:hover {
            background-color: rgba(0, 0, 0, 0.8);
        }

        button:active {
            transform: scale(0.95);
        }

        #backLayer {
            width: 50%;
            height: 100%;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding-left: 10px;
        }

        #fwdLayer {
            width: 50%;
            height: 100%;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding-right: 10px;
        }

        @media (max-width: 768px) {
            button {
                min-width: 50px;
                min-height: 50px;
            }

            header {
                flex-direction: column;
                gap: 10px;
            }

            header ul {
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html"><img src="logo.jpg" alt="logo" width="131" height="140"></a>
        <ul>
            <li><a href="index.html">Sākums</a></li>
            <li><a href="galerija.html">Galerija</a></li>
            <li><a href="kontakti.html">Kontakti</a></li>
        </ul>
    </header>

    <div id="main-container">
        <img id="pictureGallery" src="1.jpg" alt="Gallery image">
        <div id="navigation">
            <div id="backLayer" onclick="bck()">
                <button id="backButton">&lt;</button>
            </div>
            <div id="fwdLayer" onclick="fwd()">
                <button id="forwardButton">&gt;</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
